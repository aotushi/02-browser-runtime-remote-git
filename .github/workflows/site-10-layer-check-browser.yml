name: Site 10-Layer Check Browser

on:
  workflow_dispatch:
    inputs:
      target:
        description: Optional single target URL or domain. Leave empty to use target_file.
        required: false
        default: ""
      target_file:
        description: Target file to run when target is empty.
        required: false
        default: targets.json
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  browser-runtime:
    name: Browser runtime check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run manual target
        if: github.event_name == 'workflow_dispatch' && inputs.target != ''
        run: npm run start -- --wait-ms 3000 "${{ inputs.target }}"

      - name: Run manual target file
        if: github.event_name == 'workflow_dispatch' && inputs.target == ''
        run: npm run start -- --target-file "${{ inputs.target_file }}"

      - name: Run scheduled targets
        if: github.event_name == 'schedule'
        run: npm run start -- --target-file targets.json

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-10-layer-check-browser-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            reports
            snapshots
            screenshots
